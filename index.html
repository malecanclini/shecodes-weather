<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheCodes Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .app-container { width: 100%; max-width: 860px; }

    /* ── Search ── */
    .search-form { display: flex; gap: 10px; margin-bottom: 24px; }

    .search-form input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      outline: none;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    .search-form input::placeholder { color: rgba(255,255,255,0.55); }
    .search-form input:focus { background: rgba(255,255,255,0.22); }

    .btn {
      padding: 14px 26px;
      border-radius: 50px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    .btn-search { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; }
    .btn-locate { background: rgba(255,255,255,0.18); color: #fff; backdrop-filter: blur(6px); }

    /* ── Weather card ── */
    .weather-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 32px 36px;
      margin-bottom: 20px;
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }

    .city-name { font-size: 38px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
    .weather-date { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 4px; font-weight: 400; }
    .weather-description { font-size: 20px; font-weight: 600; text-transform: capitalize; color: rgba(255,255,255,0.9); margin-top: 6px; }

    .weather-main { display: flex; align-items: center; gap: 4px; margin-top: 6px; }

    #icon { width: 90px; height: 90px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }

    .temp-block { display: flex; flex-direction: column; }

    .temperature { font-size: 86px; font-weight: 800; line-height: 1; letter-spacing: -3px; }

    .unit-toggle { font-size: 22px; color: rgba(255,255,255,0.55); margin-top: 4px; letter-spacing: 1px; }
    .unit-toggle a { color: rgba(255,255,255,0.55); text-decoration: none; cursor: pointer; transition: color 0.2s; }
    .unit-toggle a:hover { color: #fff; }
    .unit-toggle a.active { color: #ffd200; font-weight: 700; }

    /* ── Details ── */
    .weather-details {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }
    .weather-details strong { color: #fff; font-weight: 700; }

    /* ── Forecast ── */
    #forecast .row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .col-2 {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      padding: 14px 8px;
      text-align: center;
    }

    .weather-forecast-date {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.65);
    }

    .col-2 img { width: 44px; height: 44px; margin: 6px auto 4px; display: block; }

    .weather-forecast-temperature { font-size: 13px; margin-top: 4px; }
    .weather-forecast-temperature-high { font-size: 16px; font-weight: 800; color: #fff; margin-right: 4px; }
    .weather-forecast-temperature-low { color: rgba(255,255,255,0.5); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 40px; font-size: 18px; color: rgba(255,255,255,0.6); }

    /* ── Footer ── */
    footer { margin-top: 28px; text-align: center; font-size: 13px; color: rgba(255,255,255,0.45); }
    footer a { color: #ffd200; text-decoration: none; font-weight: 700; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .temperature { font-size: 64px; }
      .city-name { font-size: 28px; }
      #forecast .row { grid-template-columns: repeat(3, 1fr); }
      .weather-card { padding: 22px 20px; }
    }
  </style>
</head>
<body>

<div class="app-container">

  <!-- Search -->
  <form class="search-form" id="search-form">
    <input type="text" id="search-input-result" placeholder="Enter a city..." autocomplete="off" />
    <button class="btn btn-search" type="submit">Search</button>
    <button class="btn btn-locate" type="button" id="current-location-button">📍 My Location</button>
  </form>

  <!-- Weather Card -->
  <div class="weather-card">
    <div id="loading" class="loading">Loading weather... ☁️</div>

    <div id="weather-content" style="display:none;">
      <div class="weather-header">
        <div>
          <div class="city-name" id="current-city">—</div>
          <div class="weather-date" id="date">—</div>
          <div class="weather-description" id="weather">—</div>
        </div>
        <div class="weather-main">
          <img id="icon" src="" alt="weather icon" />
          <div class="temp-block">
            <div class="temperature">
              <span id="temperature">—</span><span style="font-size:42px;">°</span>
            </div>
            <div class="unit-toggle">
              <a id="celsius-link" class="active">C</a>
              &nbsp;|&nbsp;
              <a id="fahrenheit-link">F</a>
            </div>
          </div>
        </div>
      </div>

      <div class="weather-details">
        <div>💧 Humidity: <strong><span id="humidity">—</span>%</strong></div>
        <div>💨 Wind: <strong><span id="wind">—</span> km/h</strong></div>
      </div>
    </div>
  </div>

  <!-- Forecast -->
  <div id="forecast"></div>

  <!-- Footer -->
  <footer>
    <p>
      Coded with ❤️ &nbsp;·&nbsp;
      <a href="https://github.com/YOUR-USERNAME/shecodes-weather" target="_blank" rel="noopener">
        ✦ View on GitHub
      </a>
    </p>
  </footer>

</div>

<script>
  let celsiusTemperature = null;

  function formatDate(timestamp) {
    let date = new Date(timestamp);
    let hours = date.getHours();
    if (hours < 10) hours = `0${hours}`;
    let minutes = date.getMinutes();
    if (minutes < 10) minutes = `0${minutes}`;
    let days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    let day = days[date.getDay()];
    return `${day} ${hours}:${minutes}`;
  }

  function formatDay(timestamp) {
    let date = new Date(timestamp * 1000);
    let days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    return days[date.getDay()];
  }

  function showContent() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("weather-content").style.display = "block";
  }

  function displayForecast(response) {
    let forecast = response.data.daily;
    let forecastElement = document.querySelector("#forecast");
    let forecastHTML = `<div class="row">`;

    forecast.forEach(function (forecastDay, index) {
      if (index > 0) {
        forecastHTML += `
          <div class="col-2">
            <div class="weather-forecast-date">${formatDay(forecastDay.time)}</div>
            <img src="http://shecodes-assets.s3.amazonaws.com/api/weather/icons/${forecastDay.condition.icon}.png" alt="${forecastDay.condition.description}" />
            <div class="weather-forecast-temperature">
              <span class="weather-forecast-temperature-high">${Math.round(forecastDay.temperature.maximum)}°</span>
              <span class="weather-forecast-temperature-low">${Math.round(forecastDay.temperature.minimum)}°</span>
            </div>
          </div>`;
      }
    });

    forecastHTML += `</div>`;
    forecastElement.innerHTML = forecastHTML;
  }

  function getForecast(coordinates) {
    let apiKey = "4c2d34edtb05a9b0ao32170dd17e08f4";
    let apiUrl = `https://api.shecodes.io/weather/v1/forecast?lat=${coordinates.latitude}&lon=${coordinates.longitude}&key=${apiKey}&units=metric`;
    axios.get(apiUrl).then(displayForecast);
  }

  function showTemperature(response) {
    celsiusTemperature = response.data.temperature.current;

    document.querySelector("#temperature").innerHTML = Math.round(celsiusTemperature);
    document.querySelector("#current-city").innerHTML = response.data.city;
    document.querySelector("#weather").innerHTML = response.data.condition.description;
    document.querySelector("#humidity").innerHTML = response.data.temperature.humidity;
    document.querySelector("#wind").innerHTML = Math.round(response.data.wind.speed);
    document.querySelector("#date").innerHTML = formatDate(response.data.time * 1000);

    let iconElement = document.querySelector("#icon");
    iconElement.setAttribute("src", `http://shecodes-assets.s3.amazonaws.com/api/weather/icons/${response.data.condition.icon}.png`);
    iconElement.setAttribute("alt", response.data.condition.description);

    celsiusLink.classList.add("active");
    fahrenheitLink.classList.remove("active");

    getForecast(response.data.coordinates);
    showContent();
  }

  function search(city) {
    let apiKey = "4c2d34edtb05a9b0ao32170dd17e08f4";
    let apiUrl = `https://api.shecodes.io/weather/v1/current?query=${city}&key=${apiKey}&units=metric`;
    axios.get(apiUrl).then(showTemperature);
  }

  function searchLocation(position) {
    let apiKey = "4c2d34edtb05a9b0ao32170dd17e08f4";
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;
    let apiUrl = `https://api.shecodes.io/weather/v1/current?lat=${lat}&lon=${lon}&key=${apiKey}&units=metric`;
    axios.get(apiUrl).then(showTemperature);
  }

  function getCurrentLocation(event) {
    event.preventDefault();
    navigator.geolocation.getCurrentPosition(searchLocation);
  }

  function fahrenheitTemp(event) {
    event.preventDefault();
    celsiusLink.classList.remove("active");
    fahrenheitLink.classList.add("active");
    let fahrenheitTemperature = (celsiusTemperature * 9) / 5 + 32;
    document.querySelector("#temperature").innerHTML = Math.round(fahrenheitTemperature);
  }

  function celsiusTemp(event) {
    event.preventDefault();
    celsiusLink.classList.add("active");
    fahrenheitLink.classList.remove("active");
    document.querySelector("#temperature").innerHTML = Math.round(celsiusTemperature);
  }

  function handleCity(e) {
    e.preventDefault();
    let searchInput = document.querySelector("#search-input-result");
    if (searchInput.value.trim()) {
      search(searchInput.value.trim());
    } else {
      alert("Please type a city");
    }
  }

  let fahrenheitLink = document.querySelector("#fahrenheit-link");
  fahrenheitLink.addEventListener("click", fahrenheitTemp);

  let celsiusLink = document.querySelector("#celsius-link");
  celsiusLink.addEventListener("click", celsiusTemp);

  document.querySelector("#current-location-button").addEventListener("click", getCurrentLocation);
  document.querySelector("#search-form").addEventListener("submit", handleCity);

  document.querySelector("#date").innerHTML = formatDate(new Date());
  search("Asunción");
</script>
</body>
</html>
